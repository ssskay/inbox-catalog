<svg viewBox="0 0 1200 675" width="1200" height="675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three ways to connect: a Gmail connector in Claude, a read-only app password, or a Google Takeout export file. All three lead to the same catalog, and the skill picks the path for you.">
  <defs>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="#0d1117"/>

  <!-- header -->
  <text class="sans" x="60" y="56" font-size="30" font-weight="700" fill="#e6edf3">Three ways in — same catalog</text>
  <text class="sans" x="60" y="84" font-size="16" fill="#8b949e">you don't pick a path; the skill picks the safest one that works with what you have</text>
  <rect x="908" y="38" width="232" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
  <text class="sans" x="1024" y="58" font-size="13" fill="#8b949e" text-anchor="middle">every path is read-only</text>

  <!-- ===== path cards ===== -->
  <!-- card 1 -->
  <rect x="60" y="140" width="470" height="128" rx="10" fill="#161b22" stroke="#30363d"/>
  <text class="sans" x="84" y="176" font-size="16" font-weight="700" fill="#e6edf3">💬 Gmail already connected in Claude?</text>
  <text class="sans" x="84" y="202" font-size="13.5" fill="#8b949e">Claude reads your orders directly in the conversation.</text>
  <text class="sans" x="84" y="222" font-size="13.5" fill="#8b949e">Works on any shop.</text>
  <rect x="84" y="234" width="150" height="22" rx="11" fill="#0d1117" stroke="#3fb950"/>
  <text class="sans" x="159" y="249" font-size="11.5" fill="#3fb950" text-anchor="middle">zero setup · no install</text>

  <!-- card 2 -->
  <rect x="60" y="288" width="470" height="128" rx="10" fill="#161b22" stroke="#30363d"/>
  <text class="sans" x="84" y="324" font-size="16" font-weight="700" fill="#e6edf3">🔑 Personal Gmail?</text>
  <text class="sans" x="84" y="350" font-size="13.5" fill="#8b949e">A ~3-click app password unlocks the live, photo-powered</text>
  <text class="sans" x="84" y="370" font-size="13.5" fill="#8b949e">version. Revocable any time, from one Google page.</text>
  <rect x="84" y="382" width="216" height="22" rx="11" fill="#0d1117" stroke="#3fb950"/>
  <text class="sans" x="192" y="397" font-size="11.5" fill="#3fb950" text-anchor="middle">full features · read-only · revocable</text>

  <!-- card 3 -->
  <rect x="60" y="436" width="470" height="128" rx="10" fill="#161b22" stroke="#30363d"/>
  <text class="sans" x="84" y="472" font-size="16" font-weight="700" fill="#e6edf3">🗂️ Locked-down account, or extra careful?</text>
  <text class="sans" x="84" y="498" font-size="13.5" fill="#8b949e">Export your mail once from Google Takeout and point the</text>
  <text class="sans" x="84" y="518" font-size="13.5" fill="#8b949e">engine at the file. The engine never touches your account.</text>
  <rect x="84" y="530" width="196" height="22" rx="11" fill="#0d1117" stroke="#3fb950"/>
  <text class="sans" x="182" y="545" font-size="11.5" fill="#3fb950" text-anchor="middle">no credentials · just a file</text>

  <!-- ===== converging arrows ===== -->
  <g fill="none" stroke="#3fb950" stroke-width="3" stroke-linecap="round">
    <path d="M 540 204 C 620 204, 640 300, 706 330"/>
    <path d="M 540 352 C 600 352, 620 352, 700 355"/>
    <path d="M 540 500 C 620 500, 640 404, 706 376"/>
  </g>
  <path d="M 712 336 L 736 353 L 708 364 Z" fill="#3fb950"/>

  <!-- ===== the one catalog ===== -->
  <rect x="746" y="210" width="394" height="290" rx="12" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text class="sans" x="770" y="244" font-size="15" font-weight="700" fill="#e6edf3">📦 The same catalog, either way</text>
  <line x1="746" y1="258" x2="1140" y2="258" stroke="#30363d"/>
  <g class="mono" font-size="12.5" fill="#c9d1d9">
    <text x="770" y="288">🔨 Craft Vinyl Roll 12x5ft ×2</text>
    <text x="770" y="313" fill="#d29922">   ⏳ 15 days left to return</text>
    <text x="770" y="342">🌟 Anime Collectible Figure</text>
    <text x="770" y="367" fill="#f85149">   expired 1d ago</text>
    <text x="770" y="396">🎁 Baby Milestone Blanket Set</text>
    <text x="770" y="421" fill="#d29922">   ⏳ 18 days left to return</text>
  </g>
  <text class="sans" x="943" y="470" font-size="12" fill="#8b949e" text-anchor="middle" font-style="italic">items · makers · prices · photos · return clocks</text>

  <!-- bottom strip -->
  <g class="sans" font-size="14">
    <text x="90" y="620"><tspan fill="#3fb950">✓</tspan><tspan fill="#c9d1d9"> read-only on every path</tspan></text>
    <text x="380" y="620"><tspan fill="#3fb950">✓</tspan><tspan fill="#c9d1d9"> nothing written until --apply</tspan></text>
    <text x="720" y="620"><tspan fill="#3fb950">✓</tspan><tspan fill="#c9d1d9"> try the built-in demo first, no mail at all</tspan></text>
  </g>

  <!-- footer -->
  <text class="sans" x="60" y="655" font-size="13" fill="#8b949e">github.com/ssskay/inbox-catalog   ·   pip install inbox-catalog</text>
</svg>
